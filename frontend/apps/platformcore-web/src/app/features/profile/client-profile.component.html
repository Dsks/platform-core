<main class="client-profile">
  <header class="profile-header">
    <div>
      <h1>Perfil</h1>
    </div>
  </header>

  <section class="session-card" aria-labelledby="session-title">
    <h2 id="session-title">Sesion actual</h2>

    @if (currentUser(); as user) {
      <dl>
        <div>
          <dt>Email</dt>
          <dd>{{ user.email }}</dd>
        </div>
        <div>
          <dt>Roles</dt>
          <dd>
            @for (role of user.roles; track role) {
              <span>{{ role }}</span>
            }
          </dd>
        </div>
      </dl>
    } @else {
      <p class="empty-state">No hay datos de usuario disponibles.</p>
    }
  </section>
</main>
