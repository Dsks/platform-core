<main class="client-login">
  <mat-card class="login-panel" aria-labelledby="client-login-title">
    <mat-card-content class="login-content">
      <div class="login-heading">
        <img class="auth-logo" src="logo.webp" alt="Logo" />
        <h1 id="client-login-title">Iniciar sesión</h1>
      </div>

      <form class="login-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
        @if (errorMessage(); as message) {
          <p class="login-error" role="alert">{{ message }}</p>
        }

        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Email</mat-label>
          <input
            matInput
            type="email"
            formControlName="email"
            autocomplete="email"
            [attr.aria-invalid]="isFieldInvalid('email')"
          />
          @if (isFieldInvalid('email')) {
            <mat-error>Introduce un email válido.</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="auth-field">
          <mat-label>Contraseña</mat-label>
          <input
            matInput
            type="password"
            formControlName="password"
            autocomplete="current-password"
            [attr.aria-invalid]="isFieldInvalid('password')"
          />
          @if (isFieldInvalid('password')) {
            <mat-error>Introduce tu contraseña.</mat-error>
          }
        </mat-form-field>

        <button
          mat-flat-button
          color="primary"
          class="submit-button"
          type="submit"
          [disabled]="loading()"
        >
          <span class="button-content">
            @if (loading()) {
              <mat-progress-spinner
                class="button-spinner"
                mode="indeterminate"
                [diameter]="18"
              />
              <span>Entrando...</span>
            } @else {
              <span>Entrar</span>
            }
          </span>
        </button>

        <p class="form-link">
          ¿Aún no tienes cuenta?
          <a mat-button color="primary" routerLink="/registro">Crear cuenta</a>
        </p>
      </form>
    </mat-card-content>
  </mat-card>
</main>
