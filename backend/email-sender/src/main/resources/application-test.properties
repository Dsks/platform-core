spring.application.name=platformcore-email-sender
# IMPORTANTE: Disable automatic Docker Compose management from Spring Boot
spring.docker.compose.enabled=false
spring.mail.host=localhost
spring.mail.port=1025
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Disable runtime workers/listeners during context tests
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.auto-startup=false
spring.task.scheduling.enabled=false
# Test-only key (Base64, 32 bytes) required by PayloadCryptoPort bean
platformcore.email.payload-key-b64=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=