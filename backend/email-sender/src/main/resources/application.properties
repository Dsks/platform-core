spring.application.name=platformcore-email-sender
# IMPORTANTE: Desactivar gestion automatica de Docker Compose de Spring Boot
spring.docker.compose.enabled=false
# --- BASE DE DATOS ---
spring.datasource.url=${EMAIL_DB_URL}
spring.datasource.username=${EMAIL_DB_USER}
spring.datasource.password=${EMAIL_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# --- MAIL ---
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_SMTP_SSL:false}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_SMTP_WRITE_TIMEOUT:5000}
platformcore.mail.from=${PLATFORMCORE_MAIL_FROM:no-reply@platformcore.app}
platformcore.mail.app-name=${PLATFORMCORE_MAIL_APP_NAME:PlatformCore}
platformcore.mail.subject.email-verification=${PLATFORMCORE_SUBJECT_EMAIL_VERIFICATION:Verify your email}
platformcore.email.payload-key-b64=${PLATFORMCORE_EMAIL_PAYLOAD_KEY_B64}
platformcore.email.retry.fixed-delay-ms=${PLATFORMCORE_EMAIL_RETRY_FIXED_DELAY_MS:30000}
platformcore.email.retry.batch-size=${PLATFORMCORE_EMAIL_RETRY_BATCH_SIZE:20}
platformcore.email.retry.max-attempts=${PLATFORMCORE_EMAIL_RETRY_MAX_ATTEMPTS:5}
platformcore.email.retry.min-age-seconds=${PLATFORMCORE_EMAIL_RETRY_MIN_AGE_SECONDS:30}
# --- KAFKA ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=${EMAIL_SENDER_GROUP_ID:platformcore-email-sender}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
platformcore.kafka.topics.email-commands=${PLATFORMCORE_TOPIC_EMAIL_COMMANDS:platformcore.email.commands}