spring.application.name=platformcore-api-users
# IMPORTANTE: Disable automatic Docker Compose management from Spring Boot
spring.docker.compose.enabled=false
spring.mail.host=localhost
spring.mail.port=1025
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
platformcore.security.jwt.secret=test-secret-at-least-32-characters-long
platformcore.security.jwt.expiration-ms=86400000
platformcore.security.cookie.secure=false
platformcore.security.cookie.same-site=Lax
platformcore.security.verification.cookie.secure=false
platformcore.security.verification.cookie.same-site=Lax
platformcore.security.csrf.cookie.secure=false
platformcore.security.csrf.cookie.same-site=Lax
platformcore.outbox.publisher.enabled=false
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
