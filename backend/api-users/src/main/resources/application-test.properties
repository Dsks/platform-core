spring.application.name=qomo-api-users
# IMPORTANTE: Disable automatic Docker Compose management from Spring Boot
spring.docker.compose.enabled=false
spring.mail.host=localhost
spring.mail.port=1025
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
qomo.security.jwt.secret=test-secret-at-least-32-characters-long
qomo.security.jwt.expiration-ms=86400000
qomo.security.cookie.secure=false
qomo.security.cookie.same-site=Lax
qomo.security.verification.cookie.secure=false
qomo.security.verification.cookie.same-site=Lax
qomo.security.csrf.cookie.secure=false
qomo.security.csrf.cookie.same-site=Lax
qomo.outbox.publisher.enabled=false
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
