spring.application.name=platformcore-api-users
# IMPORTANTE: Disable automatic Docker Compose management from Spring Boot
spring.docker.compose.enabled=false
# --- BASE DE DATOS ---
spring.datasource.url=${USERS_DB_URL}
spring.datasource.username=${USERS_DB_USER}
spring.datasource.password=${USERS_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# --- APP ---
platformcore.bootstrap.superadmin.email=${SUPERADMIN_EMAIL:superadmin@platformcore.app}
platformcore.bootstrap.superadmin.initial-password=${SUPERADMIN_INITIAL_PASSWORD:}
platformcore.security.jwt.secret=${JWT_SECRET}
platformcore.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
platformcore.security.cookie.secure=${PLATFORMCORE_COOKIE_SECURE:true}
platformcore.security.cookie.same-site=${PLATFORMCORE_COOKIE_SAMESITE:Lax}
platformcore.security.verification.cookie.name=${PLATFORMCORE_VERIFICATION_COOKIE_NAME:PLATFORMCORE_VERIF}
platformcore.security.verification.cookie.secure=${PLATFORMCORE_VERIFICATION_COOKIE_SECURE:true}
platformcore.security.verification.cookie.same-site=${PLATFORMCORE_VERIFICATION_COOKIE_SAMESITE:Lax}
platformcore.security.csrf.cookie.secure=${PLATFORMCORE_CSRF_COOKIE_SECURE:true}
platformcore.security.csrf.cookie.same-site=${PLATFORMCORE_CSRF_COOKIE_SAMESITE:Lax}
platformcore.security.verification.otp.ttl-seconds=${PLATFORMCORE_VERIFICATION_OTP_TTL_SECONDS:600}
platformcore.security.verification.otp.max-attempts=${PLATFORMCORE_VERIFICATION_OTP_MAX_ATTEMPTS:5}
# --- KAFKA ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
platformcore.kafka.topics.email-commands=${PLATFORMCORE_TOPIC_EMAIL_COMMANDS:platformcore.email.commands}
# --- OUTBOX ---
platformcore.outbox.publisher.enabled=${PLATFORMCORE_OUTBOX_PUBLISHER_ENABLED:true}
platformcore.outbox.publisher.fixed-delay-ms=${PLATFORMCORE_OUTBOX_PUBLISHER_DELAY_MS:2000}
platformcore.outbox.publisher.batch-size=${PLATFORMCORE_OUTBOX_PUBLISHER_BATCH_SIZE:50}
platformcore.outbox.publisher.max-attempts=${PLATFORMCORE_OUTBOX_PUBLISHER_MAX_ATTEMPTS:10}
platformcore.outbox.publisher.min-age-ms=${PLATFORMCORE_OUTBOX_PUBLISHER_MIN_AGE_MS:500}
platformcore.security.verification.resend-min-interval-seconds=${PLATFORMCORE_VERIFICATION_RESEND_MIN_INTERVAL_SECONDS:60}
# --- OPENAPI / SWAGGER ---
springdoc.api-docs.enabled=${PLATFORMCORE_OPENAPI_ENABLED:false}
springdoc.swagger-ui.enabled=${PLATFORMCORE_SWAGGER_UI_ENABLED:false}
