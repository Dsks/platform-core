spring.application.name=qomo-api-users
# IMPORTANTE: Disable automatic Docker Compose management from Spring Boot
spring.docker.compose.enabled=false
# --- BASE DE DATOS ---
spring.datasource.url=${USERS_DB_URL}
spring.datasource.username=${USERS_DB_USER}
spring.datasource.password=${USERS_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# --- APP ---
qomo.bootstrap.superadmin.email=${SUPERADMIN_EMAIL:superadmin@qomo.app}
qomo.bootstrap.superadmin.initial-password=${SUPERADMIN_INITIAL_PASSWORD:}
qomo.security.jwt.secret=${JWT_SECRET}
qomo.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
qomo.security.cookie.secure=${QOMO_COOKIE_SECURE:true}
qomo.security.cookie.same-site=${QOMO_COOKIE_SAMESITE:Lax}
qomo.security.verification.cookie.name=${QOMO_VERIFICATION_COOKIE_NAME:QOMO_VERIF}
qomo.security.verification.cookie.secure=${QOMO_VERIFICATION_COOKIE_SECURE:true}
qomo.security.verification.cookie.same-site=${QOMO_VERIFICATION_COOKIE_SAMESITE:Lax}
qomo.security.csrf.cookie.secure=${QOMO_CSRF_COOKIE_SECURE:true}
qomo.security.csrf.cookie.same-site=${QOMO_CSRF_COOKIE_SAMESITE:Lax}
qomo.security.verification.otp.ttl-seconds=${QOMO_VERIFICATION_OTP_TTL_SECONDS:600}
qomo.security.verification.otp.max-attempts=${QOMO_VERIFICATION_OTP_MAX_ATTEMPTS:5}
# --- KAFKA ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
qomo.kafka.topics.email-commands=${QOMO_TOPIC_EMAIL_COMMANDS:qomo.email.commands}
# --- OUTBOX ---
qomo.outbox.publisher.enabled=${QOMO_OUTBOX_PUBLISHER_ENABLED:true}
qomo.outbox.publisher.fixed-delay-ms=${QOMO_OUTBOX_PUBLISHER_DELAY_MS:2000}
qomo.outbox.publisher.batch-size=${QOMO_OUTBOX_PUBLISHER_BATCH_SIZE:50}
qomo.outbox.publisher.max-attempts=${QOMO_OUTBOX_PUBLISHER_MAX_ATTEMPTS:10}
qomo.outbox.publisher.min-age-ms=${QOMO_OUTBOX_PUBLISHER_MIN_AGE_MS:500}
qomo.security.verification.resend-min-interval-seconds=${QOMO_VERIFICATION_RESEND_MIN_INTERVAL_SECONDS:60}