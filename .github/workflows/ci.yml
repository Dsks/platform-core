name: CI - Qomo Platform

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # BACKEND (Java 21 + Gradle) - 3 services
  # ------------------------------------------------------------------
  backend-ci:
    name: Backend Check - ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [api-users, api-core, email-sender]

    defaults:
      run:
        working-directory: ./backend/${{ matrix.service }}

    env:
      SPRING_PROFILES_ACTIVE: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Formatting (Spotless)
        run: ./gradlew spotlessCheck

      - name: Run Tests
        run: ./gradlew test

      - name: Run Cross-Service E2E (api-users)
        if: matrix.service == 'api-users'
        run: ./gradlew crossServiceE2eTest

  # ------------------------------------------------------------------
  # FRONTEND (Angular + NX) - 2 apps
  # ------------------------------------------------------------------
  frontend-ci:
    name: Frontend Check - ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app: [qomo-web, qomo-admin]

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npx nx lint ${{ matrix.app }}

      - name: Unit Tests (Coverage)
        run: npx nx test ${{ matrix.app }} --coverage

      - name: Build
        run: npx nx build ${{ matrix.app }}
