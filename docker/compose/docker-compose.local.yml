name: qomo-platform

services:
  # ---------- DB ----------
  postgres:
    image: postgres:16-alpine
    container_name: qomo_postgres
    restart: unless-stopped
    profiles: ["infra", "full"]
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - qomo_postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [qomo-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- Kafka ----------
  kafka:
    image: apache/kafka:4.1.1
    container_name: qomo_kafka
    restart: unless-stopped
    profiles: ["infra", "full"]
    networks: [qomo-network]
    ports:
    - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_LOG_DIRS: /var/lib/kafka/data

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 1
    volumes:
      - qomo_kafka_data:/var/lib/kafka/data
    tmpfs:
      - /etc/kafka/secrets
      - /mnt/shared/config

  # ---------- Mailpit (dev) ----------
  mailpit:
    image: axllent/mailpit
    container_name: qomo_mailpit
    restart: unless-stopped
    profiles: ["infra", "full"]
    ports:
      - "${MAIL_WEB_PORT}:8025"
      - "${SPRING_MAIL_PORT}:1025"
    networks: [qomo-network]

  # ---------- API USERS ----------
  api-users:
    image: europe-southwest1-docker.pkg.dev/apps-ds-global/qomo-platform/api-users:${IMAGE_TAG}
    build:
      context: ../../backend/api-users
      dockerfile: Dockerfile
    container_name: qomo_api_users
    restart: unless-stopped
    profiles: ["users", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks: [qomo-network]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      USERS_DB_URL: ${USERS_DB_URL}
      USERS_DB_USER: ${USERS_DB_USER}
      USERS_DB_PASSWORD: ${USERS_DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}

      HOST: ${HOST}

      SUPERADMIN_INITIAL_PASSWORD: ${SUPERADMIN_INITIAL_PASSWORD}

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  # ---------- API CORE ----------
  api-core:
    image: europe-southwest1-docker.pkg.dev/apps-ds-global/qomo-platform/api-core:${IMAGE_TAG}
    build:
      context: ../../backend/api-core
      dockerfile: Dockerfile
    container_name: qomo_api_core
    restart: unless-stopped
    profiles: ["core", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks: [qomo-network]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      CORE_DB_URL: ${CORE_DB_URL}
      CORE_DB_USER: ${CORE_DB_USER}
      CORE_DB_PASSWORD: ${CORE_DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}

      HOST: ${HOST}

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  # ---------- EMAIL SENDER (consumer Kafka) ----------
  email-sender:
    image: europe-southwest1-docker.pkg.dev/apps-ds-global/qomo-platform/email-sender:${IMAGE_TAG}
    build:
      context: ../../backend/email-sender
      dockerfile: Dockerfile
    container_name: qomo_email_sender
    restart: unless-stopped
    profiles: ["email", "full"]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      mailpit:
        condition: service_started
    networks: [qomo-network]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      EMAIL_DB_URL: ${EMAIL_DB_URL}
      EMAIL_DB_USER: ${EMAIL_DB_USER}
      EMAIL_DB_PASSWORD: ${EMAIL_DB_PASSWORD}

      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}

      QOMO_EMAIL_PAYLOAD_KEY_B64: ${QOMO_EMAIL_PAYLOAD_KEY_B64}

      HOST: ${HOST}

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  # ---------- Gateway (Nginx) ----------
  gateway:
    image: nginx:alpine
    container_name: qomo_gateway
    restart: unless-stopped
    profiles: ["gateway", "full"]
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-users
      - api-core
      - frontend-client
      - frontend-admin
    networks: [qomo-network]

  # ---------- Frontend CLIENT ----------
  frontend-client:
    image: europe-southwest1-docker.pkg.dev/apps-ds-global/qomo-platform/frontend-client:${IMAGE_TAG}
    build:
      context: ../../frontend
      dockerfile: Dockerfile.client
    container_name: qomo_frontend_client
    restart: unless-stopped
    profiles: ["front", "full"]
    ports:
      - "4200:4200"
    networks: [qomo-network]

  # ---------- Frontend ADMIN ----------
  frontend-admin:
    image: europe-southwest1-docker.pkg.dev/apps-ds-global/qomo-platform/frontend-admin:${IMAGE_TAG}
    build:
      context: ../../frontend
      dockerfile: Dockerfile.admin
    container_name: qomo_frontend_admin
    restart: unless-stopped
    profiles: ["front", "full"]
    ports:
      - "4201:80"
    networks: [qomo-network]

networks:
  qomo-network:
    driver: bridge

volumes:
  qomo_postgres_data:
  qomo_kafka_data:
