server {
  listen 80;
  server_name _;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

  # Health
  location = /health {
    default_type text/plain;
    return 200 "ok\n";
  }

  # ------------------------
  # Global OpenAPI / Swagger blocks
  # ------------------------
  # Public documentation must be namespaced by service to avoid collisions.

  location = /v3/api-docs {
    return 404;
  }

  location = /v3/api-docs/ {
    return 404;
  }

  location /v3/api-docs/ {
    return 404;
  }

  location = /v3/api-docs.yaml {
    return 404;
  }

  location = /swagger-ui {
    return 404;
  }

  location = /swagger-ui/ {
    return 404;
  }

  location /swagger-ui/ {
    return 404;
  }

  location = /swagger-ui.html {
    return 404;
  }

  # ------------------------
  # API Users OpenAPI / Swagger (local/dev)
  # ------------------------

  location = /api-users/v3/api-docs {
    proxy_pass http://api-users:8080/v3/api-docs;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location = /api-users/v3/api-docs.yaml {
    proxy_pass http://api-users:8080/v3/api-docs.yaml;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api-users/v3/api-docs/ {
    proxy_pass http://api-users:8080/v3/api-docs/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types application/json;
    sub_filter "/v3/api-docs" "/api-users/v3/api-docs";
  }

  location = /api-users/swagger-ui {
    return 302 /api-users/swagger-ui/index.html;
  }

  location = /api-users/swagger-ui/ {
    return 302 /api-users/swagger-ui/index.html;
  }

  location = /api-users/swagger-ui.html {
    return 302 /api-users/swagger-ui/index.html;
  }

  location /api-users/swagger-ui/ {
    proxy_pass http://api-users:8080/swagger-ui/;
    proxy_redirect /swagger-ui/ /api-users/swagger-ui/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html application/javascript text/javascript application/json;
    sub_filter "/v3/api-docs" "/api-users/v3/api-docs";
  }

  # ------------------------
  # API Core OpenAPI / Swagger
  # ------------------------
  # api-core does not currently expose Springdoc/OpenAPI. Keep it blocked until
  # the service explicitly adds Swagger support and local/dev exposure is needed.

  location = /api-core/v3/api-docs {
    return 404;
  }

  location = /api-core/v3/api-docs.yaml {
    return 404;
  }

  location /api-core/v3/api-docs/ {
    return 404;
  }

  location = /api-core/swagger-ui {
    return 404;
  }

  location = /api-core/swagger-ui/ {
    return 404;
  }

  location /api-core/swagger-ui/ {
    return 404;
  }

  location = /api-core/swagger-ui.html {
    return 404;
  }

  # ------------------------
  # APIs
  # ------------------------

  location = /v1/auth {
    proxy_pass http://api-users:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /v1/auth/ {
    proxy_pass http://api-users:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location = /v1/users {
    proxy_pass http://api-users:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /v1/users/ {
    proxy_pass http://api-users:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location = /v1/core {
    proxy_pass http://api-core:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /v1/core/ {
    proxy_pass http://api-core:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # ------------------------
  # Frontend Admin (static)
  # ------------------------
  location /admin/ {
    proxy_pass http://frontend-admin:80/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # ------------------------
  # Frontend Client (SSR node)
  # ------------------------
  location / {
    proxy_pass http://frontend-client:4200;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    # SSR / websockets
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
