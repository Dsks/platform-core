
server {

    listen 80;
    server_name pre-qch.apps-ds.com;

    # Redirección de HTTP a HTTPS
    return 301 https://$host$request_uri;

}

server {
    listen 443 ssl;
    server_name pre-qch.apps-ds.com;

    # Rutas a los certificados SSL
    ssl_certificate /etc/letsencrypt/live/pre-qch.apps-ds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pre-qch.apps-ds.com/privkey.pem;

    # Configuración del proxy inverso
    # ---------- APIs ----------
    location = /v1/users {
        proxy_pass http://127.0.0.1:31030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location /v1/users/ {
        proxy_pass http://127.0.0.1:31030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location = /v1/users {
        proxy_pass http://127.0.0.1:31030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location /v1/users/ {
        proxy_pass http://127.0.0.1:31030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location = /v1/core {
        proxy_pass http://127.0.0.1:31031;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    location /v1/core/ {
        proxy_pass http://127.0.0.1:31031;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # ---------- Admin ----------
    location /admin/ {
        proxy_pass http://127.0.0.1:31033/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Frontend client (SSR) ----------
    location / {
        proxy_pass http://127.0.0.1:31032;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
