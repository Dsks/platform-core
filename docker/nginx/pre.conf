server {
    listen 80;
    server_name pre-qch.apps-ds.com;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # HTTP to HTTPS redirect.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pre-qch.apps-ds.com;

    ssl_certificate /etc/letsencrypt/live/pre-qch.apps-ds.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pre-qch.apps-ds.com/privkey.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # Health
    location = /health {
        default_type text/plain;
        return 200 "ok\n";
    }

    # ------------------------
    # OpenAPI / Swagger blocks
    # ------------------------
    # Shared preprod must not expose public Swagger, namespaced or global.

    location = /v3/api-docs {
        return 404;
    }

    location = /v3/api-docs/ {
        return 404;
    }

    location /v3/api-docs/ {
        return 404;
    }

    location = /v3/api-docs.yaml {
        return 404;
    }

    location = /swagger-ui {
        return 404;
    }

    location = /swagger-ui/ {
        return 404;
    }

    location /swagger-ui/ {
        return 404;
    }

    location = /swagger-ui.html {
        return 404;
    }

    location = /api-users/v3/api-docs {
        return 404;
    }

    location = /api-users/v3/api-docs.yaml {
        return 404;
    }

    location /api-users/v3/api-docs/ {
        return 404;
    }

    location = /api-users/swagger-ui {
        return 404;
    }

    location = /api-users/swagger-ui/ {
        return 404;
    }

    location /api-users/swagger-ui/ {
        return 404;
    }

    location = /api-users/swagger-ui.html {
        return 404;
    }

    location = /api-core/v3/api-docs {
        return 404;
    }

    location = /api-core/v3/api-docs.yaml {
        return 404;
    }

    location /api-core/v3/api-docs/ {
        return 404;
    }

    location = /api-core/swagger-ui {
        return 404;
    }

    location = /api-core/swagger-ui/ {
        return 404;
    }

    location /api-core/swagger-ui/ {
        return 404;
    }

    location = /api-core/swagger-ui.html {
        return 404;
    }

    # ------------------------
    # APIs
    # ------------------------

    location = /v1/auth {
        proxy_pass http://127.0.0.1:31030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/auth/ {
        proxy_pass http://127.0.0.1:31030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /v1/users {
        proxy_pass http://127.0.0.1:31030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/users/ {
        proxy_pass http://127.0.0.1:31030;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /v1/core {
        proxy_pass http://127.0.0.1:31031;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /v1/core/ {
        proxy_pass http://127.0.0.1:31031;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ------------------------
    # Frontend Admin
    # ------------------------
    location /admin/ {
        proxy_pass http://127.0.0.1:31033/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ------------------------
    # Frontend Client (SSR node)
    # ------------------------
    location / {
        proxy_pass http://127.0.0.1:31032;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSR / websockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
